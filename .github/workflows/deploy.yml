name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      # 復号テスト・問題件数0チェックを含む(GAIMUIN_PASSPHRASE未設定時はスキップ)
      - name: Test
        run: npm test
        env:
          GAIMUIN_PASSPHRASE: ${{ secrets.GAIMUIN_PASSPHRASE }}

      - name: Build
        run: npm run build

      - name: Validate manifest
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const dir = 'dist';
            const file = fs.readdirSync(dir).find(f => f.endsWith('manifest.webmanifest'));
            if (!file) { console.error('manifest.webmanifest not found'); process.exit(1); }
            const manifest = JSON.parse(fs.readFileSync(path.join(dir, file), 'utf-8'));
            if (!manifest.name || !Array.isArray(manifest.icons) || manifest.icons.length === 0) {
              console.error('manifest invalid'); process.exit(1);
            }
            console.log('manifest OK:', file);
          "

      - name: Check questions.enc exists
        run: test -s dist/data/questions.enc

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
